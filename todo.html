<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Attractive To-Do List App</title>
    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1d2671,#c33764);
            padding:20px;
        }

        /* Main Container */

        .container{
            width:100%;
            max-width:500px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.2);
            border-radius:25px;
            padding:30px;
            box-shadow:0 8px 32px rgba(0,0,0,0.3);
            animation:fadeIn 1s ease;
        }

        /* Heading */

        h1{
            text-align:center;
            color:white;
            font-size:34px;
            margin-bottom:25px;
            letter-spacing:1px;
        }

        /* Input Section */

        .input-box{
            display:flex;
            gap:12px;
            margin-bottom:25px;
        }

        .input-box input{
            flex:1;
            padding:14px;
            border:none;
            outline:none;
            border-radius:15px;
            background:rgba(255,255,255,0.2);
            color:white;
            font-size:16px;
            transition:0.3s;
        }

        .input-box input::placeholder{
            color:#e0e0e0;
        }

        .input-box input:focus{
            background:rgba(255,255,255,0.3);
            transform:scale(1.02);
        }

        /* Add Button */

        .input-box button{
            padding:14px 20px;
            border:none;
            border-radius:15px;
            background:linear-gradient(135deg,#ff9966,#ff5e62);
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
            font-weight:bold;
        }

        .input-box button:hover{
            transform:translateY(-3px) scale(1.05);
            box-shadow:0 6px 15px rgba(0,0,0,0.3);
        }

        /* Task List */

        ul{
            list-style:none;
        }

        /* Task Item */

        li{
            background:rgba(255,255,255,0.15);
            padding:15px;
            margin-bottom:15px;
            border-radius:18px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            color:white;
            font-size:17px;
            transition:0.3s;
            animation:slideUp 0.5s ease;
        }

        li:hover{
            transform:translateY(-3px);
            background:rgba(255,255,255,0.25);
        }

        /* Completed Task */

        li.completed span{
            text-decoration:line-through;
            opacity:0.6;
        }

        /* Buttons */

        .task-actions{
            display:flex;
            gap:12px;
        }

        .task-actions button{
            border:none;
            background:rgba(255,255,255,0.2);
            width:40px;
            height:40px;
            border-radius:50%;
            cursor:pointer;
            font-size:18px;
            transition:0.3s;
            color:white;
        }

        .complete-btn:hover{
            background:#00c853;
            transform:scale(1.15);
        }

        .delete-btn:hover{
            background:#ff1744;
            transform:scale(1.15);
        }

        /* Responsive Design */

        @media(max-width:600px){

            .container{
                padding:22px;
            }

            h1{
                font-size:28px;
            }

            .input-box{
                flex-direction:column;
            }

            .input-box button{
                width:100%;
            }

            li{
                flex-direction:column;
                align-items:flex-start;
                gap:10px;
            }

            .task-actions{
                align-self:flex-end;
            }
        }

        /* Animations */

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @keyframes slideUp{
            from{
                opacity:0;
                transform:translateY(10px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>📝 My To-Do List</h1>

        <!-- Input Box -->

        <div class="input-box">
            <input type="text" id="taskInput" placeholder="Enter your task...">

            <button onclick="addTask()">➕ Add</button>
        </div>

        <!-- Task List -->

        <ul id="taskList"></ul>

    </div>

    <script>

        // Load tasks from localStorage

        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

        // Save tasks

        function saveTasks(){
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }

        // Display tasks

        function displayTasks(){

            const taskList = document.getElementById("taskList");

            taskList.innerHTML = "";

            tasks.forEach((task, index) => {

                const li = document.createElement("li");

                if(task.completed){
                    li.classList.add("completed");
                }

                li.innerHTML = `
                    <span>${task.text}</span>

                    <div class="task-actions">

                        <button class="complete-btn" onclick="toggleTask(${index})">
                            ${task.completed ? "✅" : "✔️"}
                        </button>

                        <button class="delete-btn" onclick="deleteTask(${index})">
                            🗑️
                        </button>

                    </div>
                `;

                taskList.appendChild(li);

            });
        }

        // Add Task

        function addTask(){

            const input = document.getElementById("taskInput");

            const taskText = input.value.trim();

            if(taskText === ""){
                alert("Please enter a task!");
                return;
            }

            tasks.push({
                text: taskText,
                completed:false
            });

            saveTasks();

            displayTasks();

            input.value = "";
        }

        // Mark Complete

        function toggleTask(index){

            tasks[index].completed = !tasks[index].completed;

            saveTasks();

            displayTasks();
        }

        // Delete Task

        function deleteTask(index){

            tasks.splice(index,1);

            saveTasks();

            displayTasks();
        }

        // Initial Display

        displayTasks();

    </script>

</body>
</html>
